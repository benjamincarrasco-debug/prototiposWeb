<!DOCTYPE html>
<!--declara el tipo de documento. indica al navegador que usara htm5-->
<html lang="es">
<!--elemento principal del documento html. lang="es" indica que el contenido esta en "español"-->

<head><!--seccion de configuracion de documento-->
    <meta charset="UTF-8">
    <!--define la codificacion de caracteres.UTF-8 permite usar correctamente tildes, ñ, simbolos, etc-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--hace que el sitio sea responsive. permite que el diseño se adapte correctamente a celulares y tablets-->
    <title>practicando html - imgn y videos</title>
    <!--titulo que aparece en el navegador-->
    <meta name="author" content="Benja yopo">
    <!--indica quien crreo el sitio web-->

    <link rel="stylesheet" href="static/css/style.css">
    <!--conexion con hoja CSS de estilos-->
</head>
<body>
    <header><!--encabezado del documento-->
<h1>sitio multimedia personal</h1>
    </header>
    <hr><!--crea una linea de divicion-->
    <main><!--seccion principal de documanto-->
        <h2>mis datos:</h2>
        <p>nombre:benja yopo<br><!--es un salto de linea-->
            curso: 3°C
        </p>
        <hr>
        <h2>Galeria multimedia</h2>
    <p>kinoto</p>
    <img src="static/images/imagen1.jpg" alt="primera imagen" width="300">
    <img src="static/images/imagen2.jpg" alt="primera imagen" width="300">
    <img src="static/images/imagen3.jpg" alt="primera imagen" width="300">
    <hr>
    <h2>Videos</h2>
    <video width="600" controls>
    <source src="static/videos/Yopo - MEDIO MUERTO [MUSIC VIDEO] - Yopo (1080p, h264).mp4" type="video/mp4">
    </video>
     <video width="600" controls>
    <source src="static/videos/KURAIMOKHA - SHIBUSEN [MUSIC VIDEO] - kuraimokha (720p, h264).mp4" type="video/mp4">
    </video>
    </main>
    <footer>
        <p style="text-align: center">
            todos los derechos reservados-<a href="https://open.spotify.com/playlist/4dPXbpTQ7DOu4LFUIjvWmT">mas informacion</a> <!--etiqueta <a> para vinculos-->
        </p>
    </footer>
</body>

</html>
